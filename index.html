<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="The Broom — captura mental rápida e declutter">
  <meta name="theme-color" content="#0a0a0a" id="meta-theme">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Broom">

  <title>The Broom</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ========================================================
       TOPBAR
       ======================================================== -->
  <header class="topbar">

    <div class="topbar-brand">
      The Broom<span> /</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon"></span>
      <input type="text" id="search" placeholder="Buscar..." autocomplete="off" spellcheck="false">
    </div>

    <div class="topbar-actions">

      <!-- View -->
      <button class="icon-btn active" id="btn-view-grid"    title="Grid"></button>
      <button class="icon-btn"        id="btn-view-list"    title="Lista"></button>
      <button class="icon-btn"        id="btn-view-masonry" title="Masonry"></button>
      <button class="icon-btn"        id="btn-view-panorama" title="Panorama"></button>

      <div class="topbar-divider"></div>

      <!-- Zoom -->
      <button class="icon-btn" id="btn-zoom-out" title="Menos colunas"></button>
      <button class="icon-btn" id="btn-zoom-in"  title="Mais colunas"></button>

      <div class="topbar-divider"></div>

      <!-- Archived toggle -->
      <button class="icon-btn" id="btn-archived" title="Arquivados"></button>

      <!-- Sync -->
      <button class="icon-btn" id="btn-sync" title="Sincronizar" style="position:relative">
        <span id="btn-sync-icon"></span>
        <span class="sync-dot online" id="sync-dot"></span>
      </button>

      <!-- Theme -->
      <button class="icon-btn" id="btn-theme" title="Alternar tema"></button>

      <!-- Settings -->
      <button class="icon-btn" id="btn-settings" title="Configurações"></button>

    </div>
  </header>

  <!-- ========================================================
       FILTER BAR
       ======================================================== -->
  <nav class="filterbar" id="filter-bar"></nav>

  <!-- ========================================================
       MAIN GRID
       ======================================================== -->
  <main class="main-content">
    <div id="grid" data-view="grid" data-zoom="3"></div>
  </main>

  <!-- ========================================================
       FAB
       ======================================================== -->
  <button id="fab" aria-label="Adicionar item"></button>

  <!-- ========================================================
       INSTANT CAPTURE
       ======================================================== -->
  <div id="instant-capture" role="dialog" aria-label="Captura rápida">
    <input type="text" id="instant-input" placeholder="Capturar pensamento..." autocomplete="off" maxlength="200">
    <button id="instant-save">OK</button>
  </div>

  <!-- ========================================================
       MODAL — ADD / EDIT
       ======================================================== -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
    <div class="modal">

      <div class="modal-header">
        <span id="modal-heading">Novo item</span>
        <button class="icon-btn" id="modal-close" aria-label="Fechar"></button>
      </div>

      <div class="modal-body">

        <div class="field-group">
          <div class="field-label">Título</div>
          <input type="text" id="modal-title" placeholder="Título do item"
            autocomplete="off" maxlength="120">
        </div>

        <div class="field-group">
          <div class="field-label">Descrição</div>
          <textarea id="modal-description" placeholder="Detalhe, contexto, links..." rows="5"></textarea>
        </div>

        <div class="field-group">
          <div class="field-label">Categoria</div>
          <select id="modal-category"></select>
        </div>

      </div>

      <div class="modal-footer">
        <div class="modal-footer-left">
          <button class="btn-ghost"   id="modal-archive"></button>
          <button class="btn-danger"  id="modal-delete"></button>
        </div>
        <button class="btn-primary" id="modal-save">Salvar</button>
      </div>

    </div>
  </div>

  <!-- ========================================================
       SETTINGS PANEL
       ======================================================== -->
  <div id="settings-overlay" role="dialog" aria-modal="true" aria-label="Configurações">
    <div class="settings-panel">

      <div class="settings-header">
        <span class="settings-title">Configurações</span>
        <button class="icon-btn" id="settings-close" aria-label="Fechar"></button>
      </div>

      <section class="settings-section">
        <div class="settings-section-title">Aparência</div>
        <div class="settings-row">
          <label for="settings-theme">Tema</label>
          <select id="settings-theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div class="settings-row">
          <label for="settings-default-view">Visualização padrão</label>
          <select id="settings-default-view">
            <option value="grid">Grid</option>
            <option value="list">Lista</option>
            <option value="masonry">Masonry</option>
          </select>
        </div>
      </section>

      <section class="settings-section">
        <div class="settings-section-title">Comportamento</div>
        <div class="settings-row">
          <label for="settings-fab">Botão "+"</label>
          <select id="settings-fab">
            <option value="modal">Modal completo</option>
            <option value="instant">Captura rápida</option>
          </select>
        </div>
      </section>

      <section class="settings-section">
        <div class="settings-section-title">Categorias</div>
        <div class="category-list" id="category-list"></div>
        <button class="btn-ghost" id="btn-add-category"
          style="margin-top:8px;width:100%;justify-content:center">
          + Nova categoria
        </button>
      </section>

    </div>
  </div>

  <!-- ========================================================
       SCRIPTS
       ======================================================== -->
  <script src="icons.js"></script>
  <script src="db.js"></script>
  <script src="api.js"></script>
  <script src="ui.js"></script>
  <script src="panorama.js"></script>
  <script src="app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelector('.search-icon').innerHTML      = getIcon('search', 16);
      document.getElementById('fab').innerHTML              = getIcon('plus', 24);
      document.getElementById('btn-view-grid').innerHTML    = getIcon('grid', 18);
      document.getElementById('btn-view-list').innerHTML    = getIcon('list', 18);
      document.getElementById('btn-view-masonry').innerHTML = getIcon('masonry', 18);
      document.getElementById('btn-view-panorama').innerHTML= getIcon('maximize', 18);
      document.getElementById('btn-zoom-out').innerHTML     = getIcon('zoom-out', 18);
      document.getElementById('btn-zoom-in').innerHTML      = getIcon('zoom-in', 18);
      document.getElementById('btn-archived').innerHTML     = getIcon('archive', 18);
      document.getElementById('btn-sync-icon').innerHTML    = getIcon('sync', 18);
      document.getElementById('btn-theme').innerHTML        = getIcon('sun', 18);
      document.getElementById('btn-settings').innerHTML     = getIcon('settings', 18);
      document.getElementById('modal-close').innerHTML      = getIcon('close', 18);
      document.getElementById('settings-close').innerHTML   = getIcon('close', 18);
      document.getElementById('modal-archive').innerHTML    = getIcon('archive', 16) + ' Arquivar';
      document.getElementById('modal-delete').innerHTML     = getIcon('trash', 16)   + ' Excluir';
    });
  </script>

</body>
</html>
